---
# Dongle-centric build set:
#   - crosses_dongle (XIAO BLE)  : USB-attached BLE central, runs ZMK Studio
#   - crosses_left_dongle  + crosses_left  : left half as pure peripheral
#   - crosses_right_dongle + crosses_right : right half as pure peripheral
#
# The `_dongle` shields stack on top of the upstream shields (gggw-zmk-keebs)
# to override role/wiring without forking the module.
include:
  - board: seeeduino_xiao_ble
    shield: crosses_dongle
    artifact-name: crosses_36_dongle
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y

  - board: nice_nano
    shield: crosses_left crosses_left_dongle
    artifact-name: crosses_36_left

  - board: nice_nano
    shield: crosses_right crosses_right_dongle
    artifact-name: crosses_36_right

  - board: nice_nano
    shield: settings_reset

  - board: seeeduino_xiao_ble
    shield: settings_reset
